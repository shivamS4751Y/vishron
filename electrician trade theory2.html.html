        .footer-nav { margin-top: 25px; display: flex; justify-content: flex-end; }
        .next-btn { background: #1e3a8a; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; }

        .score-badge { font-size: 46px; font-weight: 800; color: #1e3a8a; margin: 25px 0; }
        .restart-btn { background: #10b981; color: white; border: none; padding: 14px 40px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }

    function startQuiz() {
        currentIdx = 0;
        userScore = 0;
        document.getElementById("quiz-ui").style.display = "block";
        document.getElementById("result-ui").style.display = "none";
        loadQuestion();
    }

    function changeLanguage(lang) {
        currentLang = lang;
        document.getElementById("btn-en").classList.toggle("active", lang === 'en');
        document.getElementById("btn-hi").classList.toggle("active", lang === 'hi');
        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById("next-btn").style.display = "none";
        const qGrid = document.getElementById("options-grid");
        qGrid.innerHTML = "";
        const currentData = masterBank[currentIdx];
        
        const currentNum = currentIdx + 1;
        document.getElementById("q-counter").innerText = currentLang === 'en' ? `Question ${currentNum} of ${masterBank.length}` : `प्रश्न ${currentNum} / ${masterBank.length}`;
        document.getElementById("progress-fill").style.width = `${(currentIdx / masterBank.length) * 100}%`;
        document.getElementById("q-text").innerText = currentLang === 'en' ? currentData.en_q : currentData.hi_q;

        const optionsList = currentLang === 'en' ? currentData.options_en : currentData.options_hi;
        optionsList.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-card";
            btn.innerHTML = `<span>${opt}</span><span id="mark-${index}"></span>`;
            btn.onclick = () => selectOption(index, btn);
            qGrid.appendChild(btn);
        });
    }

    function selectOption(selectedIndex, clickedBtn) {
        const currentData = masterBank[currentIdx];
        const correctIndex = currentData.correct;
        const allButtons = document.getElementById("options-grid").getElementsByClassName("option-card");

        for (let b of allButtons) { b.disabled = true; }

        if (selectedIndex === correctIndex) {
            clickedBtn.classList.add("correct");
            document.getElementById(`mark-${selectedIndex}`).innerText = "✅";
            userScore++;
        } else {
            clickedBtn.classList.add("wrong");
            document.getElementById(`mark-${selectedIndex}`).innerText = "❌";
            allButtons[correctIndex].classList.add("correct");
            document.getElementById(`mark-${correctIndex}`).innerText = "✅";
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function nextAction() {
        currentIdx++;
        if (currentIdx < masterBank.length) { loadQuestion(); } 
        else { document.getElementById("progress-fill").style.width = "100%"; showFinalResults(); }
    }

    function showFinalResults() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result-ui").style.display = "block";
        document.getElementById("score-display").innerText = `${userScore} / ${masterBank.length}`;
        const feedbackEl = document.getElementById("res-feedback");
        const percentage = (userScore / masterBank.length) * 100;

        if (currentLang === 'en') {
            document.getElementById("res-title").innerText = "Exam Scoreboard!";
            feedbackEl.innerText = percentage >= 80 ? "Brilliant Performance!" : percentage >= 50 ? "Good job! Keep practicing." : "Need more focus.";
        } else {
            document.getElementById("res-title").innerText = "परीक्षा स्कोरबोर्ड!";
            feedbackEl.innerText = percentage >= 80 ? "शानदार प्रदर्शन!" : percentage >= 50 ? "अच्छा प्रयास! अभ्यास जारी रखें।" : "और ध्यान देने की आवश्यकता है।";
        }
    }

    function resetQuiz() { startQuiz(); }
    window.onload = () => { startQuiz(); };
</script>

</body>
</html>
