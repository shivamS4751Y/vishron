        .progress-bar-bg { width: 100%; background: rgba(255, 255, 255, 0.03); border-radius: 20px; height: 8px; margin-bottom: 30px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }

        .arrow-line { width: 140px; height: 2px; background: #38bdf8; position: relative; display: flex; justify-content: space-between; align-items: center; }

</head>

        // Geometric Visualizer display logic for engineering context
        const drawingBox = document.getElementById("drawing-box");
        if (currentIdx === 0 || currentIdx >= 20) {
            drawingBox.style.display = "flex";
        } else {
            drawingBox.style.display = "none";
        }

        const currentNum = currentIdx + 1;
        document.getElementById("q-counter").innerText = currentLang === 'en' ? `Question ${currentNum} of ${masterBank.length}` : `प्रश्न ${currentNum} / ${masterBank.length}`;
        document.getElementById("progress-fill").style.width = `${(currentIdx / masterBank.length) * 100}%`;
        document.getElementById("q-text").innerText = currentLang === 'en' ? currentData.en_q : currentData.hi_q;

        const optionsList = currentLang === 'en' ? currentData.options_en : currentData.options_hi;
        optionsList.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-card";
            btn.innerHTML = `<span>${opt}</span><span id="mark-${index}"></span>`;
            btn.onclick = () => selectOption(index, btn);
            qGrid.appendChild(btn);
        });
    }

    function selectOption(selectedIndex, clickedBtn) {
        const currentData = masterBank[currentIdx];
        const correctIndex = currentData.correct;
        const allButtons = document.getElementById("options-grid").getElementsByClassName("option-card");

        for (let b of allButtons) { b.disabled = true; }

        if (selectedIndex === correctIndex) {
            clickedBtn.classList.add("correct");
            document.getElementById(`mark-${selectedIndex}`).innerText = "✅";
            userScore++;
        } else {
            clickedBtn.classList.add("wrong");
            document.getElementById(`mark-${selectedIndex}`).innerText = "❌";
            allButtons[correctIndex].classList.add("correct");
            document.getElementById(`mark-${correctIndex}`).innerText = "✅";
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function nextAction() {
        currentIdx++;
        if (currentIdx < masterBank.length) { loadQuestion(); } 
        else { document.getElementById("progress-fill").style.width = "100%"; showFinalResults(); }
    }

    function showFinalResults() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result-ui").style.display = "block";
        document.getElementById("score-display").innerText = `${userScore} / ${masterBank.length}`;
        const feedbackEl = document.getElementById("res-feedback");
        const percentage = (userScore / masterBank.length) * 100;

        if (currentLang === 'en') {
            document.getElementById("res-title").innerText = "Skill Matrix Scoreboard 🏆";
            feedbackEl.innerText = percentage >= 80 ? "Phenomenal! Your Employability Skills are up to corporate industry standards." : percentage >= 50 ? "Good work! Keep learning to boost your placement skills." : "Needs comprehensive revision.";
        } else {
            document.getElementById("res-title").innerText = "योग्यता स्कोरबोर्ड 🏆";
            feedbackEl.innerText = percentage >= 80 ? "असाधारण! आपकी एम्प्लॉयबिलिटी स्किल्स कॉर्पोरेट इंडस्ट्री के मानकों के अनुकूल हैं।" : percentage >= 50 ? "अच्छा काम! प्लेसमेंट स्किल्स को बढ़ाने के लिए नियमित अभ्यास करते रहें।" : "व्यापक पुनरीक्षण की आवश्यकता है।";
        }
    }

    function resetQuiz() { startQuiz(); }
    window.onload = () => { startQuiz(); };
</script>

</body>
</html>
